name: Auto-Release on Security Fix

on:
  push:
    branches:
      - main

jobs:
  auto-release:
    name: 'Create release for security fix'
    runs-on: ubuntu-latest

    # Only trigger for Renovate security commits, never for the release commit itself
    if: |
      github.actor == 'renovate[bot]' &&
      contains(github.event.head_commit.message, '[security]') &&
      !startsWith(github.event.head_commit.message, 'chore(release)')

    permissions:
      contents: write

    steps:
      - name: Generate mu88-bot app token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.MU88_BOT_APP_ID }}
          private-key: ${{ secrets.MU88_BOT_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Configure git identity for mu88-bot
        run: |
          git config user.name "mu88-bot[bot]"
          git config user.email "3498920+mu88-bot[bot]@users.noreply.github.com"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Create release
        run: dotnet tool run versionize

      - name: Push release commit and tag
        run: git push --follow-tags
