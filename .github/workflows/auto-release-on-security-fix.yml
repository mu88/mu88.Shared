name: Auto-Release on Security Fix

on:
  push:
    branches:
      - main

jobs:
  auto-release:
    name: 'Create release for security fix'
    runs-on: ubuntu-latest

    # Only trigger for mu88-bot security commits, never for the release commit itself
    if: |
      github.actor == 'mu88-bot[bot]' &&
      contains(github.event.head_commit.message, '[security]') &&
      !startsWith(github.event.head_commit.message, 'chore(release)')

    permissions:
      contents: write

    steps:
      - name: Generate mu88-bot app token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.MU88_BOT_APP_ID }}
          private-key: ${{ secrets.MU88_BOT_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Get bot user identity
        id: bot-identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          bot_slug="${{ steps.app-token.outputs.app-slug }}"
          bot_id=$(gh api "/users/${bot_slug}%5Bbot%5D" --jq .id)
          bot_login=$(gh api "/users/${bot_slug}%5Bbot%5D" --jq .login)
          echo "name=$bot_login" >> "$GITHUB_OUTPUT"
          echo "email=${bot_id}+${bot_login}@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Configure git identity for mu88-bot
        run: |
          git config user.name "${{ steps.bot-identity.outputs.name }}"
          git config user.email "${{ steps.bot-identity.outputs.email }}"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Create release
        run: dotnet tool run versionize

      - name: Push release commit and tag
        run: git push --follow-tags
