name: Auto-Release on Security Fix

on:
  push:
    branches:
      - main

jobs:
  auto-release:
    name: 'Create release for security fix'
    runs-on: ubuntu-latest

    # Only trigger for mu88-bot security commits, never for the release commit itself
    if: |
      github.actor == 'mu88-bot[bot]' &&
      contains(github.event.head_commit.message, '[security]') &&
      !startsWith(github.event.head_commit.message, 'chore(release)')

    permissions:
      contents: write

    steps:
      - name: Get bot user identity
        uses: mu88/common/.github/actions/get-bot-identity@22e167e9c593b61161fc3e00f045c5eb8a8cbaa2
        id: bot-identity
        with:
          client-id: ${{ vars.MU88_BOT_APP_ID }}
          private-key: ${{ secrets.MU88_BOT_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.bot-identity.outputs.token }}
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Configure git identity for mu88-bot
        run: |
          git config user.name "${{ steps.bot-identity.outputs.name }}"
          git config user.email "${{ steps.bot-identity.outputs.email }}"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Create release
        run: dotnet tool run versionize

      - name: Push release commit and tag
        run: git push --follow-tags
